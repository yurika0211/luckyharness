version: "3.8"

services:
  luckyharness:
    image: ghcr.io/yurika0211/luckyharness:latest
    container_name: luckyharness
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${LH_API_ADDR:-:9090}:9090"
    volumes:
      - lh-config:/etc/luckyharness
      - lh-data:/var/lib/luckyharness
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lh-config:
  lh-data: